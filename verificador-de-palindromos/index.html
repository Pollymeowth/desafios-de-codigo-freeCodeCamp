<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Palindrome Checker</title>
     <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1>Is it a Palindrome?</h1>
    <div class="card">
        <label for='text-input' >Enter in text to check for a palindrome:</label> <input id='text-input' type='text' name='input-word'>
        </input> <button id='check-btn'> Check </button>
        <div id='result'> </div>
        
    </div>
    <div class="tips">
        💡 A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring
        punctuation, case, and spacing.
    </div>

</body>
<script src="script.js"></script>

</html>
